<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Magnoliga</title>
    <link rel="icon" type="image/x-icon" href="./assets/favicon.png" > <!--favicon-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/login.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-box">
            <div class="text-center mb-4">
                <h2 class="text-white fw-bold">ADMIN PANEL</h2>
                <p class="text-secondary small">Magnoliga Mantenimiento</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label text-secondary small">Correo</label>
                    <input type="email" id="email" class="form-control bg-dark-input text-white border-secondary" required placeholder="admin@magnoliga.com">
                </div>

                <div class="mb-4">
                    <label class="form-label text-secondary small">Contraseña</label>
                    <input type="password" id="password" class="form-control bg-dark-input text-white border-secondary" required placeholder="••••••••">
                </div>

                <div id="errorMessage" class="alert alert-danger d-none p-2 small text-center">
                    Datos incorrectos
                </div>

                <button type="submit" class="btn btn-orange w-100 fw-bold">
                    ENTRAR
                </button>
            </form>
        </div>
    </div>

    <script src="./JS/login.js"></script>
</body>
</html>
